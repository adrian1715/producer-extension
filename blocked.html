<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Site Blocked - Producer</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        color: #ffffff;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        animation: fadeIn 0.5s ease-in;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .block-container {
        width: 600px;
        max-height: 100vh;
        padding: 20px 30px;
        border-radius: 20px;
        backdrop-filter: blur(10px);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      }

      .icon {
        font-size: 80px;
        margin-bottom: 20px;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.1);
        }
      }

      .title {
        font-size: 32px;
        font-weight: 700;
        margin-bottom: 8px;
        background: linear-gradient(45deg, #fff, #f0f0f0);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .message {
        font-size: 18px;
        opacity: 0.9;
        margin-bottom: 16px;
        line-height: 1.5;
      }

      .blocked-url {
        font-size: 14px;
        opacity: 0.7;
        background: rgba(255, 255, 255, 0.1);
        padding: 8px 16px;
        border-radius: 20px;
        display: inline-block;
        margin-bottom: 8px;
        word-break: break-all;
      }

      .motivational {
        font-size: 16px;
        opacity: 0.8;
        font-style: italic;
        margin: 20px 0;
        padding: 16px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        border-left: 3px solid rgba(255, 255, 255, 0.3);
      }

      .actions {
        display: flex;
        gap: 12px;
        justify-content: center;
        margin-top: 20px;
        flex-wrap: wrap;
      }

      .btn {
        background: rgba(255, 255, 255, 0.2);
        border: 2px solid rgba(255, 255, 255, 0.3);
        color: white;
        padding: 12px 24px;
        border-radius: 25px;
        font-size: 16px;
        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none;
        font-family: inherit;
      }

      .btn:hover {
        background: rgba(255, 255, 255, 0.3);
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }

      .btn-primary {
        background: rgba(46, 204, 113, 0.3);
        border-color: #2ecc71;
      }

      .btn-primary:hover {
        background: rgba(46, 204, 113, 0.5);
      }

      .btn-warning {
        background: rgba(231, 76, 60, 0.2);
        border-color: rgba(231, 76, 60, 0.5);
        font-size: 14px;
        padding: 10px 20px;
      }

      .btn-warning:hover {
        background: rgba(231, 76, 60, 0.4);
      }

      .block-number {
        font-size: 14px;
        opacity: 0.7;
        margin-bottom: 8px;
      }

      .stats {
        margin-top: 20px;
        padding: 16px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        font-size: 14px;
      }

      .time {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 8px;
        white-space: pre;
      }
    </style>
  </head>
  <body>
    <div class="block-container" id="producer-block-overlay">
      <div class="icon">&#127919;</div>
      <div class="title" id="blockTitle"></div>
      <div class="message" id="blockMessage"></div>
      <div style="margin: 20px 0">
        <div class="block-number" id="blockNumber"></div>
        <div class="blocked-url" id="blockedUrl" title=""></div>
        <div class="actions" style="margin-top: 0">
          <button
            id="allow-once-btn"
            class="btn btn-warning"
            title="Allow this site only this time"
          >
            Allow Once
          </button>
          <button
            id="add-exception-btn"
            class="btn btn-warning"
            title="Add allowed URL in the rules list"
          >
            Add Exception
          </button>
        </div>
      </div>
      <div class="motivational" id="motivationalQuote">
        Stay focused and keep pushing forward!
      </div>

      <div class="stats">
        <div class="time" id="sessionTime">Focus Session Active</div>
        <div>Keep going! Every moment of focus counts.</div>
      </div>

      <div class="actions">
        <button id="go-back-btn" class="btn">&#8592; Go Back</button>
        <button id="close-btn" class="btn btn-primary">Close Tab</button>
      </div>
    </div>
    <script src="blocked.js"></script>
  </body>
</html>
